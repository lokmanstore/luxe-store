<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Luxe Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    text-align: center;
}

/* HEADER */
header {
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

/* PRODUCTS */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    background: linear-gradient(145deg,#1e293b,#020617);
    padding: 15px;
    width: 200px;
    border-radius: 15px;
    transition: 0.3s;
    box-shadow: 0 0 20px #000;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #38bdf8;
    font-weight: bold;
}

button {
    background: #38bdf8;
    border: none;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0ea5e9;
    transform: scale(1.1);
}

/* CART */
.cart {
    position: fixed;
    right: 10px;
    top: 10px;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    margin-top: 30px;
    padding: 20px;
    opacity: 0.7;
}
</style>

</head>
<body>

<header>🔥 LUXE STORE 🔥</header>

<div class="cart">
🛒 سلة: <span id="count">0</span>
</div>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>T-Shirt</h3>
<p class="price">2000 DA</p>
<button onclick="buy('T-Shirt')">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
<h3>Hoodie</h3>
<p class="price">4500 DA</p>
<button onclick="buy('Hoodie')">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<h3>Jacket</h3>
<p class="price">6000 DA</p>
<button onclick="buy('Jacket')">شراء</button>
</div>

</div>

<footer>
© 2026 Luxe Store
</footer>

<script>
let count = 0;

function buy(product) {
    count++;
    document.getElementById("count").innerText = count;

    let phone = "213554751016"; // حط رقمك هنا

    let msg = "سلام، نحب نطلب: " + product;

    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
