<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<title>Luxe Store</title><style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

header {
    padding: 30px;
    animation: fade 1s;
}

.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    width: 220px;
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: linear-gradient(45deg, #38bdf8, #6366f1);
    border: none;
    padding: 10px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

footer {
    margin-top: 20px;
    opacity: 0.7;
}
</style></head><body><header>
    <h1>🔥 LUXE STORE</h1>
    <p>بيع ملابس ستايل عصري</p>
</header><section class="products"><div class="card">
    <img src="https://i.imgur.com/3QfKuz1.jpg">
    <h2>T-Shirt</h2>
    <p>2000 DA</p>
    <button onclick="alert('تم الطلب 🛒')">شراء</button>
</div>

<div class="card">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
    <h2>Hoodie</h2>
    <p>4500 DA</p>
    <button onclick="alert('تم الطلب 🛒')">شراء</button>
</div>

</section><footer>
    <p>© 2026 Luxe Store</p>
</footer></body>
</html>
