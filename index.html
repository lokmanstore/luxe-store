<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lokman Store</title>

<style>
body {
  background: linear-gradient(to right, #0f172a, #1e293b);
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#products {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
  width: 200px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🛒 Lokman Store</h1>

<div id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZVaPeuR0qHeANhhdqtk5Qlh-nvJObq38",
  authDomain: "lokman-store.firebaseapp.com",
  projectId: "lokman-store",
  storageBucket: "lokman-store.firebasestorage.app",
  messagingSenderId: "188621886024",
  appId: "1:188621886024:web:778b8da76734bafe6ebe7d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  const container = document.getElementById("products");

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += 
      <div class="card">
        <h3>${data.name}</h3>
        <p>${data.price} DA</p>
        <button onclick="alert('تم الشراء')">شراء</button>
      </div>
    ;
  });
}

loadProducts();
</script>

</body>
</html>
