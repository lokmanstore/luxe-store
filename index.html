<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lokman Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#06b6d4);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 50px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 200px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    background: #06b6d4;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🛒 Lokman Store</h1>

<div class="products" id="products"></div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZVaPeuR0qHeANhhdqtk5Qlh-nvJObq38",
  authDomain: "lokman-store.firebaseapp.com",
  projectId: "lokman-store",
  storageBucket: "lokman-store.firebasestorage.app",
  messagingSenderId: "188621886024",
  appId: "1:188621886024:web:778b8da76734bafe6ebe7d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsDiv = document.getElementById("products");

async function loadProducts() {
    const querySnapshot = await getDocs(collection(db, "products"));

    querySnapshot.forEach((doc) => {
        const data = doc.data();

        productsDiv.innerHTML += 
            <div class="card">
                <h3>${data.name}</h3>
                <p>${data.price} DA</p>
                <button>شراء</button>
            </div>
        ;
    });
}

loadProducts();

</script>

</body>
</html>
