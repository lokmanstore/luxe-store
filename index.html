<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHIKOR STORE</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white}

header{
padding:10px;
text-align:center;
background:#020617;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{background:#1e293b;padding:10px;border-radius:10px}
.card img{width:100%;height:120px;object-fit:cover}

.cart{
position:fixed;
bottom:0;
width:100%;
background:#020617;
padding:10px;
}

.admin{
display:none;
padding:20px;
}

.order{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.whatsapp{
background:green;
padding:10px;
text-align:center;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header onclick="secretClick()">
🔥 CHIKOR STORE
</header>

<!-- STORE -->
<div id="store">
<section class="products" id="products"></section>

<div class="cart">
💰 <span id="total">0</span> DA
<div id="cart-items"></div>

<input id="name" placeholder="الاسم"><br><br>
<input id="phone" placeholder="الهاتف"><br><br>
<input id="address" placeholder="العنوان">

<div class="whatsapp" onclick="buy()">📲 طلب</div>
</div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h2>📊 الطلبات</h2>
<div id="orders"></div>
<button onclick="back()">⬅ رجوع</button>
</div>

<script>
let clickCount=0;

function secretClick(){
clickCount++;
if(clickCount>=5){
showAdmin();
clickCount=0;
}
}

/* PRODUCTS */
const products=[
{name:"T-Shirt",price:2000,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{name:"Hoodie",price:4500,img:"https://images.unsplash.com/photo-1554568218-0f1715e72254"},
{name:"Jacket",price:6000,img:"https://images.unsplash.com/photo-1593032465171-8f0cfd2dc9b7"}
];

let cart=[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let total=0;

function showProducts(){
let html="";
products.forEach((p,i)=>{
html+=
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} DA</p>
<button onclick="add(${i})">شراء</button>
</div>;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
cart.push(products[i]);
update();
}

function update(){
total=0;
let html="";
cart.forEach(p=>{
total+=p.price;
html+=p.name+" - "+p.price+"<br>";
});
document.getElementById("cart-items").innerHTML=html;
document.getElementById("total").innerText=total;
}

function buy(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name!phone!address){
alert("⚠️ املأ المعلومات");
return;
}

let order={name,phone,address,total,date:new Date().toLocaleString()};
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

let msg="طلب:%0A"+name+"%0A"+phone+"%0A"+address+"%0Aالمجموع:"+total;
window.open("https://wa.me/213XXXXXXXXX?text="+msg);

cart=[];
update();
alert("✅ تم الطلب");
}

/* ADMIN */
function showAdmin(){
document.getElementById("store").style.display="none";
document.getElementById("admin").style.display="block";
loadOrders();
}

function back(){
document.getElementById("store").style.display="block";
document.getElementById("admin").style.display="none";
}

function loadOrders(){
let html="";
orders.forEach(o=>{
html+=
<div class="order">
${o.name}<br>
${o.phone}<br>
${o.address}<br>
${o.total} DA<br>
${o.date}
</div>;
});
document.getElementById("orders").innerHTML=html;
}

/* INIT */
showProducts();
</script>

</body>
</html>
