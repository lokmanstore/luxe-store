<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lokman Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #06b6d4);
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 200px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    background: #06b6d4;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>🛒 Lokman Store</h1>

<div class="products" id="products"></div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZVaPeuR0qHeANhhdqtk5Qlh-nvJObq38",
  authDomain: "lokman-store.firebaseapp.com",
  projectId: "lokman-store",
  storageBucket: "lokman-store.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsDiv = document.getElementById("products");

async function loadProducts() {
    const querySnapshot = await getDocs(collection(db, "products"));

    querySnapshot.forEach(doc => {
        const p = doc.data();

        productsDiv.innerHTML += 
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.price} DA</p>
            <button onclick="alert('تم الشراء')">شراء</button>
        </div>
        ;
    });
}

loadProducts();

</script>

</body>
</html>
