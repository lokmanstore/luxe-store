<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lokman Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#06b6d4);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 30px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #06b6d4;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}

.cart {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1e293b;
    padding: 10px 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>🛒 Lokman Store</header>

<div class="cart">
🛍️ Cart: <span id="count">0</span>
</div>

<div class="products">

<div class="card">
<img src="https://i.imgur.com/1.png">
<h3>T-shirt black</h3>
<p>2500 DA</p>
<button onclick="addToCart()">شراء</button>
</div>

<div class="card">
<img src="https://i.imgur.com/2.png">
<h3>Hoodie white</h3>
<p>4000 DA</p>
<button onclick="addToCart()">شراء</button>
</div>

<div class="card">
<img src="https://i.imgur.com/3.png">
<h3>Cap</h3>
<p>1500 DA</p>
<button onclick="addToCart()">شراء</button>
</div>

</div>

<script>
let count = 0;

function addToCart(){
    count++;
    document.getElementById("count").innerText = count;
    alert("تمت إضافة المنتج للسلة 🛒");
}
</script>

</body>
</html>
